<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel</title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/components.css">
</head>

<body class="ladybug-bg panel-page">


<div class="sky-background">
  <div class="cloud cloud1"></div>
  <div class="cloud cloud2"></div>
  <div class="cloud cloud3"></div>
  <div class="cloud cloud4"></div>
  <div class="cloud cloud5"></div>
  <div class="cloud cloud6"></div>
  <div class="cloud cloud7"></div>
  <div class="cloud cloud8"></div>
</div>

<!-- MENÚ GLOBAL -->
<header class="main-menu">

  <div class="menu-left">
    <span class="menu-title">Menu</span>
  </div>

  <div class="menu-right">
    <button id="menu-toggle" class="menu-toggle">☰</button>
    <button id="logout-btn" class="btn-logout">Salir</button>
  </div>

  <nav id="menu-links"></nav>

</header>

<div id="menu-overlay" class="menu-overlay"></div>

<!-- CONTENIDO DEL PANEL -->
<div class="panel-container">
  <article class="love-letter">

        <h1>Flores Amarillas🌼💛</h1>

        <p>
          Hoy 21 de Marzo se entregan flores amarillas, pero debido a mi escasa economia me gustaria darte estas flores amarillas para ti.
        </p>

    <p class="signature">
      Con todo mi cariño,<br>
      ~Gabriel
    </p>

  </article>
<div class="grass-layer">
  <div class="flower f1"></div>
  <div class="flower f2"></div>
  <div class="flower f3"></div>
  <div class="flower f4"></div>
  <div class="flower f5"></div>
</div>

<div class="grass-layer">
  <div class="flowers"></div>
</div>

</div>


<script type="module" src="js/menu.js"></script>
<script type="module" src="js/panel.js"></script>
</body>
</html>
