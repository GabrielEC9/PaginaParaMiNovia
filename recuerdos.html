<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Recuerdos</title>

  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/components.css">
</head>

<body class="ladybug-bg recuerdos-page">

<!-- FONDO -->
<div class="sky-background">
  <div class="cloud cloud1"></div>
  <div class="cloud cloud2"></div>
  <div class="cloud cloud3"></div>
  <div class="cloud cloud4"></div>
  <div class="cloud cloud5"></div>
  <div class="cloud cloud6"></div>
  <div class="cloud cloud7"></div>
  <div class="cloud cloud8"></div>
</div>

<!-- MENÚ GLOBAL -->
<header class="main-menu">

  <div class="menu-left">
    <button id="menu-toggle" class="menu-toggle">☰</button>

    <span class="menu-title">
      Bienvenida mi amor
    </span>
  </div>

  <div class="anniversary-container">
    <span class="anniversary-label">
      Próximo aniversario:
    </span>

    <span id="anniversary-countdown">
      Calculando...
    </span>
  </div>

</header>

<!-- SIDEBAR -->
<nav id="menu-links">

  <div class="menu-header">
    <span>Menú</span>

    <button id="close-menu" class="close-menu">
      ✕
    </button>
  </div>

  <div class="menu-items"></div>

  <div class="menu-footer">
    <button id="logout-btn" class="btn-logout">
      Cerrar sesión
    </button>
  </div>

</nav>

<!-- OVERLAY -->
<div id="menu-overlay" class="menu-overlay"></div>

<!-- CONTENIDO -->
<main class="recuerdos-container">

  <h1 class="recuerdos-title">
    Nuestros recuerdos
  </h1>

  <div id="recuerdos-grid" class="recuerdos-grid"></div>

</main>

<!-- MODAL -->
<div id="recuerdo-modal" class="recuerdo-modal">

  <div class="recuerdo-modal-content">

    <button id="cerrar-recuerdo" class="cerrar-recuerdo">
      ✕
    </button>

    <div id="recuerdo-completo"></div>

  </div>

</div>

<script type="module" src="js/menu.js"></script>
<script type="module" src="js/recuerdos.js"></script>

</body>
</html>
