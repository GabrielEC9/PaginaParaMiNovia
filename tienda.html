<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tienda</title>

  <!-- CSS GLOBAL -->
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/components.css">
</head>

<body class="ladybug-bg store-page">

  <!-- FONDO -->
  <div class="sky-background">
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>
    <div class="cloud cloud4"></div>
    <div class="cloud cloud5"></div>
    <div class="cloud cloud6"></div>
    <div class="cloud cloud7"></div>
    <div class="cloud cloud8"></div>
  </div>

<!-- MENÚ GLOBAL -->
<header class="main-menu">

  <div class="menu-left">
    <button id="menu-toggle" class="menu-toggle">☰</button>

    <span class="menu-title">
      Bienvenida mi amor
    </span>
  </div>

  <div class="anniversary-container">
  <span class="anniversary-label">
    Próximo aniversario:
  </span>

  <span id="anniversary-countdown">
    Calculando...
  </span>
</div>

</header>

<!-- SIDEBAR -->
<nav id="menu-links">

  <div class="menu-header">
    <span>Menú</span>

    <button id="close-menu" class="close-menu">
      ✕
    </button>
  </div>

  <!-- LINKS DINÁMICOS -->
  <div class="menu-items"></div>
  <div class="menu-footer">
    <button id="logout-btn" class="btn-logout">
      Cerrar sesión
    </button>
  </div>

</nav>

  <!-- CONTENIDO -->
  <div class="rewards-wrapper">

    <section class="rewards-header">
      <h1 class="rewards-title">🛍️ Tienda</h1>
    </section>

    <main class="rewards-container">

      <div class="user-stats">
        <p>Mis bugs: <span id="user-bugs">0</span> 🐞</p>
      </div>

      <section id="store-items" class="rewards-grid"></section>

      <div id="store-message" class="reward-message"></div>

    </main>
  </div>

  <!-- PANEL CARRITO -->
  <aside id="cart-panel" class="cart-panel">
    <h2>🛒 Carrito</h2>

    <div id="cart-items" class="cart-items"></div>

    <div class="cart-footer">
      <p>Total: 🐞 <span id="cart-total">0</span></p>
      <button id="buy-btn" class="btn-ladybug">
        <span>Comprar 🛍️</span>
      </button>
    </div>
  </aside>

  <div id="cart-overlay" class="cart-overlay"></div>

  <!-- BOTÓN FLOTANTE -->
  <button id="cart-toggle" class="cart-toggle">🛒</button>

  <!-- JS -->
  <script type="module" src="/js/supabaseClient.js"></script>
  <script type="module" src="/js/auth.js"></script>
  <script type="module" src="/js/ui.js"></script>
  <script type="module" src="/js/tienda.js"></script>
  <script type="module" src="/js/menu.js"></script>

</body>
</html>
